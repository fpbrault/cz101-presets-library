name: Build Generated Artifacts

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/cosmo-synth-engine/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/build-wasm.yml'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -L https://github.com/rustwasm/wasm-pack/releases/download/v0.13.1/wasm-pack-v0.13.1-x86_64-unknown-linux-musl.tar.gz | tar xz
          mv wasm-pack-v0.13.1-x86_64-unknown-linux-musl/wasm-pack ~/.cargo/bin/

      - name: Build WASM
        working-directory: packages/cosmo-synth-engine
        run: |
          wasm-pack build . --target no-modules --out-dir ../cz-explorer/public/cosmo-synth-engine-wasm --features wasm
          rm -f ../cz-explorer/public/cosmo-synth-engine-wasm/.gitignore

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmo-synth-engine-wasm
          path: packages/cz-explorer/public/cosmo-synth-engine-wasm/

  build-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Specta TypeScript bindings
        working-directory: packages/cosmo-synth-engine
        run: cargo run --features specta-bindings --bin export-specta-bindings

      - name: Upload bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: specta-bindings
          path: packages/cosmo-pd101/src/lib/synth/bindings/synth.ts