name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build:web

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/cz-explorer/dist/**
          if-no-files-found: warn

  build-plugins:
    name: Build and package plugins (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: universal
            build_cmd: bun run build:plugin:universal
            plugin_bundle_path: packages/cosmo-pd101/target/release/CosmoPd101.vst3
            secondary_bundle_path: packages/cosmo-pd101/target/release/CosmoPd101.component
            installer_glob: dist/plugin-installers/macos/*
            artifact_paths: |
              dist/plugin-installers/macos/*
              packages/cosmo-pd101/target/release/CosmoPd101.vst3
              packages/cosmo-pd101/target/release/CosmoPd101.component
          - os: windows-latest
            platform: windows
            arch: x86_64
            build_cmd: cross-env ARCH=x86_64 bun run build:plugin
            plugin_bundle_path: packages/cosmo-pd101/target/release/CosmoPd101.vst3
            secondary_bundle_path: ""
            installer_glob: dist/plugin-installers/windows/*x86_64-win-v*.exe
            artifact_paths: |
              dist/plugin-installers/windows/*
              packages/cosmo-pd101/target/release/CosmoPd101.vst3
          - os: windows-11-arm
            platform: windows
            arch: arm64
            build_cmd: cross-env ARCH=arm64 bun run build:plugin
            plugin_bundle_path: packages/cosmo-pd101/target/release/CosmoPd101.vst3
            secondary_bundle_path: ""
            installer_glob: dist/plugin-installers/windows/*aarch64-win-v*.exe
            artifact_paths: |
              dist/plugin-installers/windows/*
              packages/cosmo-pd101/target/release/CosmoPd101.vst3
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build plugins
        run: ${{ matrix.build_cmd }}

      - name: Install NSIS
        if: matrix.platform == 'windows'
        shell: powershell
        run: choco install nsis -y

      - name: Package plugin installers
        run: bun run scripts/package-plugin-installers.mjs --platform ${{ matrix.platform }}

      - name: Validate plugin release artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -e "${{ matrix.plugin_bundle_path }}"
          if [[ -n "${{ matrix.secondary_bundle_path }}" ]]; then
            test -e "${{ matrix.secondary_bundle_path }}"
          fi
          compgen -G "${{ matrix.installer_glob }}" > /dev/null

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  build-desktop:
    name: Build desktop app (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: windows-11-arm
            platform: windows
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build desktop app
        run: bun --filter @cosmo/cz-explorer-desktop build

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/cz-explorer-desktop/target/release/bundle/**
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    needs: [build-web, build-plugins, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Validate release assets are present
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar

          compgen -G "release-assets/**/cosmo-plugins-macos-universal-v*.pkg" > /dev/null
          compgen -G "release-assets/**/cosmo-plugins-macos-universal-v*.zip" > /dev/null
          compgen -G "release-assets/**/cz101-plugins-windows-*.exe" > /dev/null

          compgen -G "release-assets/**/CosmoPd101.vst3/**" > /dev/null
          compgen -G "release-assets/**/CosmoPd101.component/**" > /dev/null || true

          compgen -G "release-assets/**/*.dmg" > /dev/null || compgen -G "release-assets/**/*.app.tar.gz" > /dev/null
          compgen -G "release-assets/**/*.msi" > /dev/null || compgen -G "release-assets/**/*.exe" > /dev/null

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**