name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run build:web

  build-plugins:
    name: Build and package plugins (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: universal
            build_cmd: bun run build:plugin
            plugin_bundle_path: packages/cosmo-pd101-plugin/target/release/CosmoPd101.vst3
            secondary_bundle_path: packages/cosmo-pd101-plugin/target/release/CosmoPd101.component
            installer_glob: dist/plugin-installers/macos/cosmo-plugins-macos-universal-v*.pkg
            bare_glob: |
              dist/plugin-installers/macos/cosmo-pd101-plugin-macos-universal-v*-vst3.zip
              dist/plugin-installers/macos/cosmo-pd101-plugin-macos-universal-v*-auv2.zip
            artifact_paths: |
              dist/plugin-installers/macos/cosmo-plugins-macos-universal-v*.pkg
              dist/plugin-installers/macos/cosmo-plugins-macos-universal-v*.zip
              dist/plugin-installers/macos/cosmo-pd101-plugin-macos-universal-v*-vst3.zip
              dist/plugin-installers/macos/cosmo-pd101-plugin-macos-universal-v*-auv2.zip
          - os: windows-latest
            platform: windows
            arch: x86_64
            build_cmd: bun run build:plugin
            plugin_bundle_path: packages/cosmo-pd101-plugin/target/release/CosmoPd101.vst3
            secondary_bundle_path: ""
            installer_glob: dist/plugin-installers/windows/*x86_64-win-v*.exe
            bare_glob: dist/plugin-installers/windows/*x86_64-win-v*-vst3.zip
            artifact_paths: |
              dist/plugin-installers/windows/*x86_64-win-v*.exe
              dist/plugin-installers/windows/*x86_64-win-v*-vst3.zip
          - os: windows-11-arm
            platform: windows
            arch: arm64
            build_cmd: bun run build:plugin
            plugin_bundle_path: packages/cosmo-pd101-plugin/target/release/CosmoPd101.vst3
            secondary_bundle_path: ""
            installer_glob: dist/plugin-installers/windows/*aarch64-win-v*.exe
            bare_glob: dist/plugin-installers/windows/*aarch64-win-v*-vst3.zip
            artifact_paths: |
              dist/plugin-installers/windows/*aarch64-win-v*.exe
              dist/plugin-installers/windows/*aarch64-win-v*-vst3.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build plugins
        env:
          ARCH: ${{ matrix.arch }}
        run: ${{ matrix.build_cmd }}

      - name: Install NSIS
        if: matrix.platform == 'windows'
        shell: powershell
        run: choco install nsis -y

      - name: Package plugin installers
        run: bun run scripts/package-plugin-installers.mjs --platform ${{ matrix.platform }}

      - name: Validate plugin release artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -e "${{ matrix.plugin_bundle_path }}"
          if [[ -n "${{ matrix.secondary_bundle_path }}" ]]; then
            test -e "${{ matrix.secondary_bundle_path }}"
          fi
          compgen -G "${{ matrix.installer_glob }}" > /dev/null
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            compgen -G "$pattern" > /dev/null
          done <<'EOF'
          ${{ matrix.bare_glob }}
          EOF

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  build-desktop:
    name: Build desktop app (${{ matrix.platform }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64
          - os: windows-11-arm
            platform: windows
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build desktop app
        run: bun --filter @cosmo/cz-explorer-desktop build

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/cz-explorer-desktop/target/release/bundle/**/*.dmg
            packages/cz-explorer-desktop/target/release/bundle/**/*.app.tar.gz
            packages/cz-explorer-desktop/target/release/bundle/**/*setup.exe
            packages/cz-explorer-desktop/target/release/bundle/**/*.msi
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    needs: [build-web, build-plugins, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Validate release assets are present
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar

          compgen -G "release-assets/**/cosmo-plugins-macos-universal-v*.pkg" > /dev/null
          compgen -G "release-assets/**/cosmo-pd101-plugin-macos-universal-v*-vst3.zip" > /dev/null
          compgen -G "release-assets/**/cosmo-pd101-plugin-macos-universal-v*-auv2.zip" > /dev/null
          compgen -G "release-assets/**/cosmo-pd101-plugin-windows-*.exe" > /dev/null
          compgen -G "release-assets/**/cosmo-pd101-plugin-windows-*-v*-vst3.zip" > /dev/null

          compgen -G "release-assets/**/cz101-presets-library_*.dmg" > /dev/null || compgen -G "release-assets/**/cz101-presets-library_*.app.tar.gz" > /dev/null
          compgen -G "release-assets/**/cz101-presets-library_*setup.exe" > /dev/null || compgen -G "release-assets/**/cz101-presets-library_*.msi" > /dev/null

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/cosmo-plugins-macos-universal-v*.pkg
            release-assets/**/cosmo-pd101-plugin-macos-universal-v*-vst3.zip
            release-assets/**/cosmo-pd101-plugin-macos-universal-v*-auv2.zip
            release-assets/**/cosmo-pd101-plugin-windows-*.exe
            release-assets/**/cosmo-pd101-plugin-windows-*-v*-vst3.zip
            release-assets/**/cz101-presets-library_*.dmg
            release-assets/**/cz101-presets-library_*.app.tar.gz
            release-assets/**/cz101-presets-library_*setup.exe
            release-assets/**/cz101-presets-library_*.msi