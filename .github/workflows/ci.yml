name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests action
        uses: ./.github/actions/tests

  build-plugins:
    name: Build plugins (${{ matrix.platform }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            build_cmd: bun run build:plugin:universal
          - os: windows-latest
            platform: windows
            build_cmd: bun run build:plugin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run plugin build action
        uses: ./.github/actions/build-plugins
        with:
          buildCmd: ${{ matrix.build_cmd }}

  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run desktop build action
        uses: ./.github/actions/build-desktop

  migrate:
    name: Database Migration
    needs: [test, build-plugins, build-desktop]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run migration action
        uses: ./.github/actions/migrate
