name: CI

on:
  pull_request:
  push:
    branches: main

permissions:
  contents: write

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        shell: bash

      - name: Run lint fixes
        run: bun run lint:fix
        shell: bash

      - name: Auto-commit lint fixes
        if: github.event_name == 'pull_request'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(ci): apply lint fixes"
            git push
          else
            echo "No lint fixes to commit"
          fi
        shell: bash

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        shell: bash

      - name: Run unit tests
        run: bun --filter @cosmo/cz-explorer test:unit
        shell: bash

  browser-tests:
    name: Browser Tests (Vitest Browser Mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        shell: bash

      - name: Install Playwright Chromium
        run: bunx playwright install chromium chromium-headless-shell --with-deps
        shell: bash

      - name: Run browser tests
        run: bun --filter @cosmo/cz-explorer test:browser
        shell: bash

  plugin-webview-unit-tests:
    name: Plugin Webview Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        shell: bash

      - name: Install plugin webview dependencies
        run: cd packages/cosmo-pd101/webview && bun install
        shell: bash

      - name: Run plugin webview unit tests
        run: bun --filter @cosmo/cosmo-pd101 webview:test:unit
        shell: bash

  plugin-webview-e2e-tests:
    name: Plugin Webview E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        shell: bash

      - name: Install plugin webview dependencies
        run: cd packages/cosmo-pd101/webview && bun install
        shell: bash

      - name: Install Playwright Chromium
        run: bunx playwright install chromium chromium-headless-shell --with-deps
        shell: bash

      - name: Run plugin webview e2e tests
        run: bun --filter @cosmo/cosmo-pd101 webview:test:e2e
        shell: bash

  build-plugins:
    name: Build plugins (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            build_cmd: bun run build:plugin:universal
          - os: windows-latest
            platform: windows
            build_cmd: bun run build:plugin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run plugin build action
        uses: ./.github/actions/build-plugins
        with:
          buildCmd: ${{ matrix.build_cmd }}

  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    if: false # TODO: re-enable when ready
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run desktop build action
        uses: ./.github/actions/build-desktop

  migrate:
    name: Database Migration
    needs:
      [
        lint,
        unit-tests,
        browser-tests,
        plugin-webview-unit-tests,
        plugin-webview-e2e-tests,
        build-plugins,
      ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run migration action
        uses: ./.github/actions/migrate
