name: "Tests"
description: "Run unit and browser tests"
inputs:
  bunVersion:
    description: "Bun version to install"
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bunVersion }}

    - name: Install dependencies
      run: bun install
      shell: bash

    - name: Run unit tests
      run: bun --filter @cosmo/cz-explorer test:unit
      shell: bash

    - name: Install Playwright Chromium
      run: bunx playwright install chromium chromium-headless-shell --with-deps
      shell: bash

    - name: Run browser tests
      run: bun --filter @cosmo/cz-explorer test:browser
      shell: bash