name: "Build Plugins"
description: "Build plugins for a target platform"
inputs:
  buildCmd:
    description: "Plugin build command"
    required: true
  bunVersion:
    description: "Bun version to install"
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bunVersion }}

    - name: Install dependencies
      run: bun install
      shell: pwsh

    - name: Build plugins
      run: ${{ inputs.buildCmd }}
      shell: pwsh