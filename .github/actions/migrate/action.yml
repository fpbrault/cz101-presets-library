name: "Migration"
description: "Prepare database migration step"
inputs:
  bunVersion:
    description: "Bun version to install"
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bunVersion }}

    - name: Install dependencies
      run: bun install
      shell: bash