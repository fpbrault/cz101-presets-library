name: "Build Desktop"
description: "Build desktop app"
inputs:
  bunVersion:
    description: "Bun version to install"
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bunVersion }}

    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf
      shell: bash

    - name: Install dependencies
      run: bun install
      shell: bash

    - name: Build desktop app
      run: bun --filter @cosmo/cz-explorer-desktop build
      shell: bash