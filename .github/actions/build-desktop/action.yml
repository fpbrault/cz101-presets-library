name: "Build Desktop"
description: "Build desktop app"
inputs:
  bunVersion:
    description: "Bun version to install"
    required: false
    default: "latest"
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bunVersion }}

    - name: Install dependencies
      run: bun install
      shell: pwsh

    - name: Build desktop app
      run: bun --filter @cosmo/cz-explorer-desktop build
      shell: pwsh