[package]
name = "cosmo-pd101-standalone"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2.10.3", features = [] }
tauri-plugin-midi = "0.1.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
cpal = "0.17"
crossbeam = "0.8"
log = "0.4"
env_logger = "0.11"
lazy_static = "1.4"

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.25"
objc = "0.2"

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.51", features = [
	"Win32_Media_Audio",
	"Win32_System_Com",
	"Win32_Foundation"
] }

# Keep this crate independent from the repository root Cargo workspace.
[workspace]

[lib]
name = "cosmo_pd101_standalone_lib"
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "cosmo-pd101-standalone"
path = "src/main.rs"
