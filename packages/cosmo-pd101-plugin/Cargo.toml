[package]
name = "cosmo-pd101-plugin"
version = "0.1.0"
edition = "2021"
description = "Cosmo PD-101 synthesizer VST3/CLAP plugin"

[lib]
crate-type = ["cdylib"]

[features]
default = []
vst3 = ["nih_plug/vst3"]
# Reserved for check-cfg compatibility with objc/cocoa macro internals.
cargo-clippy = []
# Enable Safari Web Inspector on the plugin WebView and load UI from the repo's
# dist/ directory (instead of the bundle).  Build with:
#   cargo build -p cosmo-pd101-plugin --features debug_gui
debug_gui = []

[dependencies]
cosmo-synth-engine = { path = "../cosmo-synth-engine" }
nih_plug = { workspace = true, features = ["vst3"] }
wry = { path = "../../vendor/wry-0.47.2" }
raw-window-handle = { workspace = true }
rwh_06 = { package = "raw-window-handle", version = "0.6" }
serde_json = "1.0"
libm = "0.2"
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.26"
objc = "0.2"
