[package]
name = "cosmo-pd101"
version = "0.1.0"
edition = "2021"
description = "Cosmo PD-101 synthesizer VST3/AU plugin"

[lib]
crate-type = ["cdylib"]

[features]
default = []
au = ["beamer/au"]
vst3 = ["beamer/vst3"]
auv2 = ["au"]
auv3 = ["au"]
# Enable Safari Web Inspector on the plugin WebView and load UI from the repo's
# dist/ directory (instead of the AU bundle).  Build with:
#   cargo build -p cosmo-pd101 --features debug_gui
debug_gui = []

[dependencies]
cosmo-synth-engine = { path = "../cosmo-synth-engine" }
beamer = { workspace = true }
serde_json = "1.0"
libm = "0.2"
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.25"
objc = "0.2"
