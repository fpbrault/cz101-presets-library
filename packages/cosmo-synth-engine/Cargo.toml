[package]
name = "cosmo-synth-engine"
version = "0.1.0"
edition = "2021"
description = "Cosmo PD-101 Phase Distortion synthesizer DSP core"

[lib]
crate-type = ["cdylib", "rlib"]

# Specta bindings generator — run with: cargo run --features specta-bindings --bin export-specta-bindings
[[bin]]
name = "export-specta-bindings"
path = "export_specta_bindings.rs"
required-features = ["specta-bindings"]

[features]
default = ["std"]
std = ["serde/std", "serde_json"]
wasm = ["wasm-bindgen", "web-sys", "getrandom/wasm_js", "serde_json"]
specta-bindings = [
	"dep:specta",
	"dep:specta-serde",
	"dep:specta-typescript",
	"serde_json",
	"std",
]

[dependencies]
serde = { version = "1", features = ["derive"], default-features = false }
serde_json = { version = "1", optional = true }
libm = "0.2"

[dependencies.specta]
version = "=2.0.0-rc.24"
optional = true
features = ["derive"]

[dependencies.specta-serde]
version = "=0.0.11"
optional = true

[dependencies.specta-typescript]
version = "=0.0.11"
optional = true

[dependencies.wasm-bindgen]
version = "0.2"
optional = true

[dependencies.web-sys]
version = "0.3"
optional = true
features = ["console"]

[dependencies.getrandom]
version = "0.4"
optional = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
